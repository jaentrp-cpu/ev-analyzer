<!DOCTYPE html>
<html lang="fi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedox — Simulaatio</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root, [data-theme="dark"] {
  --bg:        #000000;
  --bg2:       #080f1e;
  --bg3:       #0c1628;
  --bg4:       #111f35;
  --blue:      #1a4fc4;
  --blue-lt:   #2d6ae0;
  --blue-dim:  rgba(26,79,196,0.14);
  --blue-dim2: rgba(26,79,196,0.22);
  --border:    rgba(30,70,160,0.22);
  --border2:   rgba(30,70,160,0.35);
  --text:      #ffffff;
  --text2:     #b0c4de;
  --text3:     #5a7090;
  --green:     #2ecc8e;
  --red:       #e03a52;
  --amber:     #d4921a;
  --radius:    8px;
  --radius-sm: 5px;
  --grid-line: rgba(26,79,196,0.06);
  --tick-color: #3a4f6a;
  --header-bg: rgba(0,0,0,0.94);
}

[data-theme="light"] {
  --bg:        #ffffff;
  --bg2:       #f4f7fc;
  --bg3:       #e8edf6;
  --bg4:       #dce5f4;
  --blue:      #1a4fc4;
  --blue-lt:   #2d6ae0;
  --blue-dim:  rgba(26,79,196,0.08);
  --blue-dim2: rgba(26,79,196,0.14);
  --border:    rgba(26,79,196,0.15);
  --border2:   rgba(26,79,196,0.25);
  --text:      #000000;
  --text2:     #2a3a52;
  --text3:     #6080a8;
  --green:     #1a9962;
  --red:       #c02030;
  --amber:     #b07010;
  --grid-line: rgba(26,79,196,0.07);
  --tick-color: #6080a8;
  --header-bg: rgba(255,255,255,0.96);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.2s, color 0.2s;
}

header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: 0.06em; color: var(--text); }
.logo-name span { color: var(--blue-lt); }
.logo-tagline { font-family: 'Barlow Condensed', sans-serif; font-size: 0.5rem; letter-spacing: 0.22em; color: var(--text3); text-transform: uppercase; display: block; }

.header-right { display: flex; align-items: center; gap: 8px; }
.sim-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); background: var(--bg3); border: 1px solid var(--border2); padding: 5px 14px; border-radius: 20px; }
.back-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; font-weight: 600; padding: 6px 16px; border-radius: 5px; cursor: pointer; text-decoration: none; transition: all 0.18s; }
.back-btn:hover { color: var(--text); border-color: var(--blue-lt); }

.theme-btn, .lang-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); font-family: 'Barlow Condensed', sans-serif; border-radius: 5px; cursor: pointer; transition: all 0.18s; display: flex; align-items: center; justify-content: center; }
.theme-btn { width: 34px; height: 34px; }
.lang-btn { font-size: 0.78rem; font-weight: 600; padding: 5px 12px; }
.lang-btn.active { color: var(--blue-lt); border-color: var(--blue); }

main { padding: 1.5rem 2rem; max-width: 1300px; margin: 0 auto; position: relative; z-index: 1; }

/* Stats cards - No top accent bar, all blue values */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.25rem; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
.stat-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 800; line-height: 1; color: var(--blue-lt); }
.stat-sub { font-size: 0.65rem; color: var(--text3); margin-top: 4px; }

/* Charts */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.25rem; }
.chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
.chart-card.full { grid-column: span 2; }
.chart-title { font-family: 'Barlow Condensed', sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 1rem; display: flex; justify-content: space-between; }

/* ROI Bars - Uniform Blue */
.roi-bar-wrap { margin-bottom: 10px; }
.roi-bar-header { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.72rem; }
.roi-bar-label { color: var(--text); }
.roi-bar-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--blue-lt); }
.roi-bar-bg { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.roi-bar-fill { height: 100%; border-radius: 3px; background: var(--blue-lt); transition: width 0.8s ease; }

/* Table */
.table-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.25rem; }
.table-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.sim-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
.sim-table th { font-family: 'Barlow Condensed', sans-serif; font-size: 0.58rem; font-weight: 700; text-transform: uppercase; color: var(--text3); padding: 8px 12px; text-align: left; background: var(--bg3); border-bottom: 1px solid var(--border); }
.sim-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--text2); }
.result-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 3px; }
.result-badge.voitto { background: rgba(46,204,142,0.12); color: var(--green); border: 1px solid rgba(46,204,142,0.25); }
.result-badge.tappio { background: rgba(224,58,82,0.12); color: var(--red); border: 1px solid rgba(224,58,82,0.25); }

.loading-box { text-align: center; padding: 4rem; color: var(--text3); }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--blue-lt); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <div class="logo-name">VEDO<span>X</span></div>
    <span class="logo-tagline">Logic Over Luck</span>
  </a>
  <div class="header-right">
    <div class="sim-badge">SIMULAATIO</div>
    <a href="index.html" class="back-btn">← Takaisin</a>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-icon">☀️</button>
    <button class="lang-btn active" onclick="setLang('fi')" id="btn-fi">FI</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
  </div>
</header>

<main>
  <div class="loading-box" id="loading">
    <div class="spinner"></div>
    <div id="loading-txt">Ladataan simulaatiodataa...</div>
  </div>

  <div class="content" id="content" style="display:none">
    <div class="stats-row" id="stats-row">
      </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title"><span data-fi="Osumisprosentti">Osumisprosentti</span></div>
        <canvas id="chart-hit"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title"><span data-fi="ROI per markkina">ROI per markkina</span></div>
        <div id="market-bars"></div>
      </div>
      <div class="chart-card full">
        <div class="chart-title"><span data-fi="Bankrollin kehitys">Bankrollin kehitys</span></div>
        <canvas id="chart-bankroll" height="100"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title"><span data-fi="ROI per kerroinväli">ROI per kerroinväli</span></div>
        <div id="odds-range-bars"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title"><span data-fi="ROI per aalto">ROI per aalto</span></div>
        <div id="wave-bars"></div>
      </div>
    </div>

    <div class="table-card">
      <div style="overflow-x:auto">
        <table class="sim-table">
          <thead>
            <tr>
              <th data-fi="Ottelu">Ottelu</th>
              <th data-fi="Markkina">Markkina</th>
              <th data-fi="Kerroin">Kerroin</th>
              <th data-fi="Tulos">Tulos</th>
              <th data-fi="Tuotto €">Tuotto €</th>
            </tr>
          </thead>
          <tbody id="bets-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
const SHEET_ID = "1t8vBG7HNKcR-YZLnQ_BBpI0R8_OtIptY_yomZhwipEo";
const SIM_GID  = "1069109120";
const START_BANKROLL = 1000;

let allBets = [];
let lang = localStorage.getItem("vedox_lang") || "fi";
let currentTheme = localStorage.getItem("vedox_theme") || "dark";
let charts = {};

function toggleTheme() {
  currentTheme = currentTheme === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", currentTheme);
  localStorage.setItem("vedox_theme", currentTheme);
  renderAll();
}

async function fetchSimData() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=tsv&gid=${SIM_GID}&t=${Date.now()}`;
    const res = await fetch(url);
    const text = await res.text();
    allBets = parseSimCSV(text);
    document.getElementById("loading").style.display = "none";
    document.getElementById("content").style.display = "block";
    renderAll();
  } catch(e) { console.error(e); }
}

function parseSimCSV(text) {
  const lines = text.trim().split("\n");
  const rows = [];
  const toNum = s => {
    if (!s) return 0;
    // Puhdistaa ja vaihtaa pilkun pisteeksi (Fiksaa kerroin-ongelman)
    let c = s.trim().replace(/\s/g,"").replace("€","").replace("%","").replace(",",".");
    return parseFloat(c) || 0;
  };

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split("\t");
    if (cols.length < 16) continue;
    rows.push({
      ottelu:   cols[2],
      markkina: (cols[4]||"").trim().toLowerCase().replace(/_/g," "), // Aggressiivinen siivous H2H:lle
      kerroin:  toNum(cols[7]),
      panos:    toNum(cols[10]),
      tulos:    (cols[15]||"kesken").trim().toLowerCase(),
      tuotto:   toNum(cols[16]),
      bankroll: toNum(cols[17]),
      aalto:    cols[5]
    });
  }
  return rows;
}

function renderAll() {
  renderStats();
  renderMarketBars();
  renderOddsRangeBars();
  renderWaveBars();
  renderBankrollChart();
  renderTable();
}

function renderStats() {
  const settled = allBets.filter(b => ["voitto","tappio","half win","half loss"].includes(b.tulos));
  const won = settled.filter(b => b.tulos.includes("win") || b.tulos === "voitto").length;
  const hitRate = settled.length > 0 ? (won / settled.length * 100).toFixed(1) : 0;
  const lastBr = allBets.length > 0 ? allBets[allBets.length-1].bankroll : START_BANKROLL;

  document.getElementById("stats-row").innerHTML = `
    <div class="stat-card"><div class="stat-lbl">Bankroll</div><div class="stat-val">${lastBr.toFixed(2)}€</div></div>
    <div class="stat-card"><div class="stat-lbl">Osumisprosentti</div><div class="stat-val">${hitRate}%</div></div>
    <div class="stat-card"><div class="stat-lbl">Vetoja</div><div class="stat-val">${allBets.length}</div></div>
    <div class="stat-card"><div class="stat-lbl">ROI</div><div class="stat-val">Sinisellä</div></div>
  `;
}

function roiBars(items, containerId) {
  document.getElementById(containerId).innerHTML = items.map(item => {
    const barW = Math.min(Math.abs(item.roi) * 2, 100);
    return `
      <div class="roi-bar-wrap">
        <div class="roi-bar-header">
          <span class="roi-bar-label">${item.label} (${item.count})</span>
          <span class="roi-bar-val">${item.roi}%</span>
        </div>
        <div class="roi-bar-bg"><div class="roi-bar-fill" style="width:${barW}%"></div></div>
      </div>`;
  }).join("");
}

function renderMarketBars() {
  const map = {};
  allBets.filter(b => b.tuotto !== 0).forEach(b => {
    const m = b.markkina || "muu";
    if(!map[m]) map[m] = {s:0, p:0, c:0};
    map[m].s += b.panos; map[m].p += b.tuotto; map[m].c++;
  });
  roiBars(Object.entries(map).map(([k,v]) => ({
    label: k.toUpperCase(), labelRaw: k, count: v.c, roi: (v.p/v.s*100).toFixed(1)
  })), "market-bars");
}

function renderOddsRangeBars() {
  const ranges = [
    {l:"1.40-1.60", min:1.4, max:1.6}, {l:"1.60-1.80", min:1.6, max:1.8},
    {l:"1.80-2.00", min:1.8, max:2.0}, {l:"2.00-2.20", min:2.0, max:2.2},
    {l:"2.20-2.50", min:2.2, max:2.6}
  ];
  const data = ranges.map(r => {
    const inR = allBets.filter(b => b.kerroin >= r.min && b.kerroin < r.max && b.tuotto !== 0);
    const s = inR.reduce((a,b)=>a+b.panos,0);
    const p = inR.reduce((a,b)=>a+b.tuotto,0);
    return { label: r.l, count: inR.length, roi: s>0 ? (p/s*100).toFixed(1) : "0.0" };
  });
  roiBars(data, "odds-range-bars");
}

function renderWaveBars() {
  const map = {};
  allBets.filter(b => b.tuotto !== 0).forEach(b => {
    const w = b.aalto || "?";
    if(!map[w]) map[w] = {s:0, p:0, c:0};
    map[w].s += b.panos; map[w].p += b.tuotto; map[w].c++;
  });
  roiBars(Object.entries(map).map(([k,v]) => ({
    label: k, count: v.c, roi: (v.p/v.s*100).toFixed(1)
  })), "wave-bars");
}

function renderBankrollChart() {
  const ctx = document.getElementById("chart-bankroll");
  if(charts.br) charts.br.destroy();
  charts.br = new Chart(ctx, {
    type: 'line',
    data: {
      labels: allBets.map((_,i)=>i),
      datasets: [{ data: allBets.map(b=>b.bankroll), borderColor: '#2d6ae0', fill: false, tension: 0.1 }]
    },
    options: { plugins: { legend: { display: false } }, scales: { x: { display: false } } }
  });
}

function renderTable() {
  const tbody = document.getElementById("bets-tbody");
  tbody.innerHTML = allBets.slice().reverse().map(b => `
    <tr>
      <td>${b.ottelu}</td>
      <td>${b.markkina.toUpperCase()}</td>
      <td>${b.kerroin.toFixed(2)}</td>
      <td><span class="result-badge ${b.tulos}">${b.tulos}</span></td>
      <td style="color:var(--blue-lt); font-weight:700">${b.tuotto > 0 ? "+" : ""}${b.tuotto.toFixed(2)}€</td>
    </tr>
  `).join("");
}

fetchSimData();
setInterval(fetchSimData, 5 * 60 * 1000);
</script>
</body>
</html>
