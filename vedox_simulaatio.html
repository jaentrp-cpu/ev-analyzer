<!DOCTYPE html>
<html lang="fi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedox — Simulaatio</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root, [data-theme="dark"] {
  --bg:        #000000;
  --bg2:       #080f1e;
  --bg3:       #0c1628;
  --bg4:       #111f35;
  --blue:      #1a4fc4;
  --blue-lt:   #2d6ae0;
  --blue-dim:  rgba(26,79,196,0.14);
  --blue-dim2: rgba(26,79,196,0.22);
  --border:    rgba(30,70,160,0.22);
  --border2:   rgba(30,70,160,0.35);
  --text:      #ffffff;
  --text2:     #b0c4de;
  --text3:     #5a7090;
  --green:     #2ecc8e;
  --red:       #e03a52;
  --amber:     #d4921a;
  --radius:    8px;
  --radius-sm: 5px;
  --grid-line: rgba(26,79,196,0.06);
  --tick-color: #3a4f6a;
  --header-bg: rgba(0,0,0,0.94);
}

[data-theme="light"] {
  --bg:        #ffffff;
  --bg2:       #f4f7fc;
  --bg3:       #e8edf6;
  --bg4:       #dce5f4;
  --blue:      #1a4fc4;
  --blue-lt:   #2d6ae0;
  --blue-dim:  rgba(26,79,196,0.08);
  --blue-dim2: rgba(26,79,196,0.14);
  --border:    rgba(26,79,196,0.15);
  --border2:   rgba(26,79,196,0.25);
  --text:      #000000;
  --text2:     #2a3a52;
  --text3:     #6080a8;
  --green:     #1a9962;
  --red:       #c02030;
  --amber:     #b07010;
  --grid-line: rgba(26,79,196,0.07);
  --tick-color: #6080a8;
  --header-bg: rgba(255,255,255,0.96);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.2s, color 0.2s;
}

[data-theme="dark"] body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(26,79,196,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,79,196,0.025) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events: none;
  z-index: 0;
}

header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon { width: 36px; height: 36px; }

.logo-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.5rem;
  letter-spacing: 0.06em;
  color: var(--text);
}

.logo-name span { color: var(--blue-lt); }

.logo-tagline {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.5rem;
  letter-spacing: 0.22em;
  color: var(--text3);
  text-transform: uppercase;
  display: block;
  margin-top: 1px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.sim-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  background: var(--bg3);
  border: 1px solid var(--border2);
  padding: 5px 14px;
  border-radius: 20px;
}

.back-btn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 6px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.18s;
}
.back-btn:hover { color: var(--text); border-color: var(--blue-lt); }

.lang-btn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 5px 12px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.18s;
}
.lang-btn:hover, .lang-btn.active { color: var(--blue-lt); border-color: var(--blue); }

.theme-btn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-size: 1rem;
  width: 34px; height: 34px;
  border-radius: 5px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
  flex-shrink: 0;
}
.theme-btn:hover { border-color: var(--blue-lt); color: var(--text); }

main {
  position: relative;
  z-index: 1;
  padding: 1.5rem 2rem;
  max-width: 1300px;
  margin: 0 auto;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 1.25rem;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  position: relative;
  overflow: hidden;
}

.stat-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}

.stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  line-height: 1;
  color: var(--blue-lt);
}

.stat-sub {
  font-size: 0.65rem;
  color: var(--text3);
  margin-top: 4px;
}

.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 1.25rem;
}

.chart-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
}

.chart-card.full { grid-column: span 2; }

.chart-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.pie-wrap {
  display: flex;
  align-items: center;
  gap: 2rem;
}

.pie-canvas { max-width: 180px; max-height: 180px; }
.pie-legend { flex: 1; }

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
  font-size: 0.78rem;
}

.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend-label { color: var(--text2); flex: 1; }
.legend-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--text); }

.roi-bar-wrap { margin-bottom: 10px; }

.roi-bar-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
  font-size: 0.72rem;
}

.roi-bar-label { color: var(--text); }
.roi-bar-count { color: var(--text3); }
.roi-bar-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  color: var(--blue-lt);
}

.roi-bar-bg {
  height: 5px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}

.roi-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--blue-lt);
  transition: width 0.8s ease;
}

.table-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 1.25rem;
}

.table-header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.table-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
}

.table-filters {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}

.tfilter {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text3);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.73rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 4px 11px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.tfilter:hover, .tfilter.active {
  color: var(--text);
  background: var(--blue-dim2);
  border-color: var(--blue-lt);
}

.sim-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
}

.sim-table th {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
  white-space: nowrap;
}

.sim-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
  vertical-align: middle;
}

.sim-table tr:hover td { background: var(--blue-dim); }

.result-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 3px;
}
