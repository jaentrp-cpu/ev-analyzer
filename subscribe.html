<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BettiPena — Tilaa hälytykset</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff3366;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, 40px); }
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    color: var(--accent);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 4px 12px;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 0.75rem;
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-size: 0.8rem;
    line-height: 1.7;
    margin-bottom: 2.5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2rem;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .form-group { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input[type="email"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    padding: 0.85rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="email"]:focus { border-color: var(--accent); }
  input[type="email"]::placeholder { color: var(--muted); }

  button {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    padding: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  button:hover { background: #00cc6a; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button.loading { pointer-events: none; opacity: 0.7; }

  .message {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    font-size: 0.78rem;
    display: none;
    border-left: 2px solid;
  }

  .message.success {
    display: block;
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,0.05);
  }

  .message.error {
    display: block;
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,51,102,0.05);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin-top: 1.5rem;
  }

  .stat {
    background: var(--surface);
    padding: 1rem;
    text-align: center;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .features {
    margin-top: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .feature::before {
    content: '→';
    color: var(--accent);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="container">
  <div class="badge">Live hälytykset</div>

  <h1>Betti<span>Pena</span><br>Alerts</h1>
  <p class="subtitle">
    Saat sähköpostin automaattisesti kun<br>
    Pinnacle liikkuu &gt;3% ennen soft-bookia.<br>
    EV-ikkuna on auki — toimi ensin.
  </p>

  <div class="card">
    <div class="form-group">
      <label>Sähköpostiosoite</label>
      <input type="email" id="emailInput" placeholder="sinä@gmail.com" autocomplete="email">
    </div>
    <button id="submitBtn" onclick="subscribe()">
      Tilaa ilmaiset hälytykset
    </button>
    <div class="message" id="message"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-value">&gt;3%</span>
      <span class="stat-label">Liike-kynnys</span>
    </div>
    <div class="stat">
      <span class="stat-value">5min</span>
      <span class="stat-label">Tarkistusväli</span>
    </div>
    <div class="stat">
      <span class="stat-value">13</span>
      <span class="stat-label">Liigaa seurattuna</span>
    </div>
  </div>

  <div class="features">
    <div class="feature">Pinnacle no-vig vs. soft-book vertailu</div>
    <div class="feature">EV lasketaan automaattisesti</div>
    <div class="feature">Peruuta milloin tahansa</div>
  </div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwCV2ys570UCKcmocu9BAzbTnYGp6-SuKFwKwpqJQptOWOHCsstTav3D3DPrhdXwFvP/exec";

  async function subscribe() {
    const email = document.getElementById("emailInput").value.trim();
    const btn = document.getElementById("submitBtn");
    const msg = document.getElementById("message");

    if (!email || !email.includes("@")) {
      msg.className = "message error";
      msg.textContent = "Syötä kelvollinen sähköpostiosoite.";
      return;
    }

    btn.textContent = "Lähetetään...";
    btn.classList.add("loading");
    msg.className = "message";

    try {
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ email }),
        headers: { "Content-Type": "application/json" }
      });
      const data = await res.json();

      if (data.success) {
        msg.className = "message success";
        msg.textContent = data.message;
        document.getElementById("emailInput").value = "";
        btn.textContent = "✓ Tilattu!";
      } else {
        msg.className = "message error";
        msg.textContent = data.message || "Jokin meni pieleen.";
        btn.textContent = "Tilaa ilmaiset hälytykset";
        btn.classList.remove("loading");
      }
    } catch(e) {
      msg.className = "message error";
      msg.textContent = "Verkkovirhe. Yritä uudelleen.";
      btn.textContent = "Tilaa ilmaiset hälytykset";
      btn.classList.remove("loading");
    }
  }

  document.getElementById("emailInput").addEventListener("keypress", e => {
    if (e.key === "Enter") subscribe();
  });
</script>
</body>
</html>
