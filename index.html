<!DOCTYPE html>
<html lang="fi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedox — Logic Over Luck</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root, [data-theme="dark"] {
  --bg:#08090d;
  --bg2:#0e1016;
  --bg3:#13161e;
  --bg4:#1a1d27;
  --surface:#11141b;
  --surface-2:#171b24;
  --surface-3:#1e2330;
  --blue:#2457b8;
  --blue-lt:#3a78e0;
  --blue-deep:#1f4f8f;
  --blue-soft:rgba(36,87,184,0.14);
  --blue-border:rgba(58,120,224,0.32);
  --blue-dim:rgba(36,87,184,0.10);
  --blue-dim2:rgba(36,87,184,0.20);
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.10);
  --border3:rgba(255,255,255,0.16);
  --text:#f5f7fa;
  --text2:#aab2c0;
  --text3:#6b7383;
  --text4:#4a5161;
  --green:#3a8a5c;
  --green-lt:#4a9e6e;
  --green-dim:rgba(58,138,92,0.10);
  --red:#a04444;
  --red-dim:rgba(160,68,68,0.10);
  --amber:#b88a3a;
  --amber-dim:rgba(184,138,58,0.10);
  --radius:10px;
  --radius-sm:6px;
  --radius-lg:14px;
  --header-bg:rgba(8,9,13,0.85);
  --grid-color:transparent;
  --tick-color:#4a5161;
  --shadow-soft:0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.4);
  --font-ui:'Inter','Barlow',system-ui,-apple-system,sans-serif;
  --font-num:'Inter',system-ui,sans-serif;
  --font-brand:'Barlow Condensed','Barlow',sans-serif;
}
[data-theme="light"] {
  --bg:#f6f7f4;
  --bg2:#ffffff;
  --bg3:#f1f2ee;
  --bg4:#e9eae5;
  --surface:#ffffff;
  --surface-2:#f3f4f0;
  --surface-3:#eceee8;
  --blue:#2457b8;
  --blue-lt:#1d4ed8;
  --blue-deep:#1f4f8f;
  --blue-soft:#eaf1fb;
  --blue-border:#c8d8f2;
  --blue-dim:rgba(36,87,184,0.07);
  --blue-dim2:rgba(36,87,184,0.14);
  --border:rgba(15,23,42,0.07);
  --border2:rgba(15,23,42,0.11);
  --border3:rgba(15,23,42,0.16);
  --text:#0f172a;
  --text2:#475569;
  --text3:#6b7280;
  --text4:#9ca3af;
  --green:#247a4d;
  --green-lt:#2c8a59;
  --green-dim:rgba(36,122,77,0.08);
  --red:#a04444;
  --red-dim:rgba(160,68,68,0.08);
  --amber:#a06b1e;
  --amber-dim:rgba(160,107,30,0.08);
  --header-bg:rgba(246,247,244,0.88);
  --tick-color:#6b7280;
  --shadow-soft:0 1px 2px rgba(15,23,42,0.04);
}

html { scroll-behavior:smooth; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
  font-size:14px;
  line-height:1.5;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  font-feature-settings:"cv11","ss01","ss03";
  transition:background 0.2s, color 0.2s;
}

/* ===== AUTH OVERLAY ===== */
#auth-overlay { position:fixed; inset:0; z-index:999; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:1rem; }
.auth-box { position:relative; z-index:2; background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius-lg); padding:2.25rem 1.75rem; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.4); animation:fadeUp 0.3s ease; }
.auth-logo { display:flex; align-items:center; gap:10px; margin-bottom:1.25rem; justify-content:center; }
.auth-logo-name { font-family:var(--font-brand); font-weight:800; font-size:1.6rem; letter-spacing:0.04em; color:var(--text); }
.auth-logo-name span { color:var(--blue-lt); }
.auth-tabs { display:none; }
.beta-notice {
  background:var(--blue-soft);
  border:1px solid var(--blue-border);
  border-radius:var(--radius-sm);
  padding:10px 12px;
  margin:0 0 1.25rem;
  font-size:0.8rem;
  color:var(--text2);
  line-height:1.45;
  text-align:center;
}
.auth-field { display:flex; flex-direction:column; gap:6px; margin-bottom:0.9rem; }
.auth-field label { font-family:var(--font-ui); font-size:0.7rem; font-weight:600; letter-spacing:0.04em; color:var(--text3); text-transform:none; }
.auth-field input,.auth-field select { background:var(--bg); border:1px solid var(--border2); color:var(--text); font-family:var(--font-ui); font-size:0.88rem; padding:9px 11px; border-radius:var(--radius-sm); outline:none; transition:border-color 0.15s; width:100%; }
.auth-field input:focus,.auth-field select:focus { border-color:var(--blue); }
.auth-btn { width:100%; background:var(--blue); border:none; color:#fff; font-family:var(--font-ui); font-size:0.88rem; font-weight:600; letter-spacing:0.01em; padding:11px; border-radius:var(--radius-sm); cursor:pointer; transition:background 0.18s; margin-top:0.5rem; }
.auth-btn:hover { background:var(--blue-lt); }
.auth-btn:disabled { opacity:0.5; cursor:not-allowed; }
.auth-msg { margin-top:0.75rem; font-size:0.78rem; text-align:center; min-height:1.2em; padding:0 4px; }
.auth-box,.auth-box * { pointer-events:auto; }

/* ===== HEADER ===== */
header {
  position:sticky; top:0; z-index:200;
  background:var(--header-bg);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 1.5rem; height:56px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-icon { width:28px; height:28px; }
.logo-text-wrap { line-height:1; }
.logo-name { font-family:var(--font-brand); font-weight:800; font-size:1.25rem; letter-spacing:0.04em; color:var(--text); }
.logo-name span { color:var(--blue-lt); }
.logo-tagline { font-family:var(--font-ui); font-size:0.55rem; letter-spacing:0.18em; color:var(--text4); text-transform:uppercase; margin-top:2px; display:block; font-weight:500; }

nav {
  display:flex; gap:0;
  background:transparent; border:none;
  border-radius:0; padding:0;
  margin-left:1.25rem;
}
.nav-btn {
  background:none; border:none;
  color:var(--text3);
  font-family:var(--font-ui); font-size:0.85rem; font-weight:500;
  letter-spacing:0; text-transform:none;
  padding:18px 14px;
  border-radius:0; cursor:pointer;
  transition:color 0.18s;
  white-space:nowrap;
  position:relative;
}
.nav-btn:hover { color:var(--text); background:transparent; }
.nav-btn.active { color:var(--text); background:transparent; }
.nav-btn.active::after {
  content:''; position:absolute; left:14px; right:14px; bottom:-1px; height:3px;
  background:var(--blue); border-radius:2px;
}

.header-right { display:flex; align-items:center; gap:10px; }
.action-cluster {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:4px;
  height:36px;
}
.action-cluster > * { height:28px; }
.action-cluster .divider {
  width:1px; height:18px; background:var(--border2); margin:0 2px;
}

.live-pill {
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--font-ui); font-size:0.72rem; font-weight:500;
  letter-spacing:0.02em; text-transform:none;
  color:var(--text2);
  background:transparent;
  border:none;
  padding:0 8px; border-radius:6px;
}
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 0 2px rgba(58,138,92,0.12); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
