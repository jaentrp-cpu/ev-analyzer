<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vedox — Logic Over Luck</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:         #070d1a;
  --bg2:        #0b1425;
  --bg3:        #0f1b30;
  --bg4:        #142038;
  --blue:       #1a5ce8;
  --blue-lt:    #3d7fff;
  --blue-dim:   rgba(26,92,232,0.12);
  --blue-dim2:  rgba(26,92,232,0.25);
  --border:     rgba(61,127,255,0.12);
  --border2:    rgba(61,127,255,0.25);
  --white:      #e2eaf8;
  --white2:     #7a8fb0;
  --white3:     #3d5070;
  --green:      #00d68f;
  --green-dim:  rgba(0,214,143,0.1);
  --red:        #ff4560;
  --red-dim:    rgba(255,69,96,0.1);
  --amber:      #ffb020;
  --amber-dim:  rgba(255,176,32,0.1);
  --radius:     10px;
  --radius-sm:  6px;
  --shadow:     0 8px 32px rgba(0,0,0,0.4);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(26,92,232,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,92,232,0.035) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* Glow orbs */
body::after {
  content: '';
  position: fixed;
  top: -20%;
  left: -10%;
  width: 60%;
  height: 60%;
  background: radial-gradient(ellipse, rgba(26,92,232,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ===== HEADER ===== */
header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(7,13,26,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 36px;
  height: 36px;
}

.logo-text-wrap { line-height: 1; }

.logo-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 1.5rem;
  letter-spacing: 0.06em;
  color: #fff;
}

.logo-name span { color: var(--blue-lt); }

.logo-tagline {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.5rem;
  letter-spacing: 0.22em;
  color: var(--white3);
  text-transform: uppercase;
  margin-top: 1px;
  display: block;
}

nav {
  display: flex;
  gap: 2px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
}

.nav-btn {
  background: none;
  border: none;
  color: var(--white2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 7px 18px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.nav-btn:hover { color: var(--white); background: var(--blue-dim); }
.nav-btn.active { color: #fff; background: var(--blue); }

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.live-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--green);
  background: var(--green-dim);
  border: 1px solid rgba(0,214,143,0.2);
  padding: 5px 12px;
  border-radius: 20px;
}

.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 1.8s infinite;
}

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

.lang-btn {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--white2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 5px 12px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.18s;
}
.lang-btn:hover, .lang-btn.active { color: var(--blue-lt); border-color: var(--blue); }

#countdown-pill {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  color: var(--white3);
}

/* ===== MAIN ===== */
main {
  position: relative;
  z-index: 1;
  padding: 1.5rem 2rem;
  max-width: 1300px;
  margin: 0 auto;
  width: 100%;
}

.page { display: none; }
.page.active { display: block; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ===== STAT GRID ===== */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 1.25rem;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}

.stat-card:hover { border-color: var(--border2); transform: translateY(-1px); }

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--blue-lt));
  opacity: 0.8;
}

.stat-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--white3);
  margin-bottom: 8px;
}

.stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  line-height: 1;
  color: #fff;
}

.stat-val.blue  { color: var(--blue-lt); }
.stat-val.green { color: var(--green); }
.stat-val.red   { color: var(--red); }
.stat-val.amber { color: var(--amber); }

/* ===== TOOLBAR ===== */
.toolbar {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-bottom: 1rem;
  padding: 1rem 1.25rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.fg { display: flex; flex-direction: column; gap: 4px; }

.fg label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white3);
}

.fg input, .fg select {
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 0.82rem;
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  width: 130px;
  outline: none;
  transition: border-color 0.18s;
}

.fg input:focus, .fg select:focus { border-color: var(--blue-lt); }
.fg select option { background: var(--bg2); }

.btn-reset {
  background: var(--red-dim);
  border: 1px solid rgba(255,69,96,0.25);
  color: var(--red);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  align-self: flex-end;
  transition: all 0.18s;
}
.btn-reset:hover { background: rgba(255,69,96,0.22); }

.filter-info {
  align-self: flex-end;
  padding-bottom: 7px;
  font-size: 0.7rem;
  color: var(--white3);
  margin-left: auto;
}
.filter-info strong { color: var(--blue-lt); }

/* ===== BET CARDS ===== */
.bet-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  position: relative;
  transition: border-color 0.18s, transform 0.15s;
}

.bet-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--blue-lt);
}

.bet-card.high::before { background: var(--amber); }
.bet-card.top::before  { background: var(--green); box-shadow: 0 0 12px rgba(0,214,143,0.5); }

.bet-card:hover { border-color: var(--border2); transform: translateX(2px); }

.bet-main {
  padding: 0.85rem 1.25rem 0.85rem 1.5rem;
  display: grid;
  grid-template-columns: 1fr 100px 120px 150px;
  gap: 1.5rem;
  align-items: center;
  cursor: pointer;
}

.match-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.54rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
}

.badge-sport { background: var(--blue-dim2); color: var(--blue-lt); border: 1px solid rgba(61,127,255,0.25); }
.badge-wave  { background: var(--bg3); color: var(--white3); border: 1px solid var(--border); }
.badge-mkt   { background: var(--bg3); color: var(--white2); border: 1px solid var(--border); }

.match-name { font-size: 0.58rem; color: var(--white3); letter-spacing: 0.03em; }

.bet-target {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.02em;
  margin-bottom: 4px;
}

.bet-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.meta-tag {
  font-size: 0.6rem;
  color: var(--white2);
  background: var(--bg3);
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid var(--border);
}

.cell { text-align: center; }

.cell-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white3);
  margin-bottom: 4px;
}

.cell-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.15rem;
  font-weight: 800;
  color: #fff;
  line-height: 1;
}

.cell-sub { font-size: 0.58rem; color: var(--white3); margin-top: 3px; }

.ev-num { color: var(--blue-lt); }
.bet-card.high .ev-num { color: var(--amber); }
.bet-card.top  .ev-num { color: var(--green); }

.kelly-box {
  background: linear-gradient(135deg, var(--blue-dim), var(--green-dim));
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 12px;
  text-align: center;
}

.kelly-amt {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--green);
  line-height: 1;
}

.kelly-pct { font-size: 0.6rem; color: var(--white2); margin-top: 3px; }
.kelly-lbl { font-size: 0.55rem; color: var(--white3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

/* Detail panel */
.bet-detail {
  display: none;
  border-top: 1px solid var(--border);
  padding: 1.1rem 1.5rem;
  background: var(--bg3);
}

.bet-detail.open { display: block; animation: fadeUp 0.2s ease; }

.detail-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 1rem;
}

.detail-cell {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  text-align: center;
}

.detail-cell-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--white3);
  margin-bottom: 4px;
}

.detail-cell-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: #fff;
}

/* ===== MY BETS ===== */
.add-bet-btn {
  background: var(--green-dim);
  border: 1px solid rgba(0,214,143,0.25);
  color: var(--green);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 9px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin-bottom: 1rem;
  transition: all 0.18s;
}
.add-bet-btn:hover { background: rgba(0,214,143,0.18); }

.add-form {
  display: none;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
  animation: fadeUp 0.2s ease;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 1rem;
}

.form-group { display: flex; flex-direction: column; gap: 5px; }

.form-group label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--white3);
}

.form-group input, .form-group select {
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 0.85rem;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 0.18s;
}

.form-group input:focus, .form-group select:focus { border-color: var(--blue-lt); }

.form-actions { display: flex; gap: 10px; }

.btn-primary {
  background: var(--blue);
  border: none;
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 9px 22px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.18s;
}
.btn-primary:hover { background: var(--blue-lt); }

.btn-secondary {
  background: none;
  border: 1px solid var(--border2);
  color: var(--white2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 9px 22px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.18s;
}
.btn-secondary:hover { color: var(--white); border-color: var(--white2); }

.mybet-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.9rem 1.25rem;
  margin-bottom: 8px;
  display: grid;
  grid-template-columns: 1fr 80px 80px 90px 110px 100px 90px;
  gap: 1rem;
  align-items: center;
  transition: border-color 0.18s;
}

.mybet-card:hover { border-color: var(--border2); }
.mybet-card.won  { border-left: 3px solid var(--green); }
.mybet-card.lost { border-left: 3px solid var(--red); }
.mybet-card.pending { border-left: 3px solid var(--amber); }

.mybet-match { font-size: 0.6rem; color: var(--white3); margin-bottom: 2px; }
.mybet-target { font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; font-weight: 700; color: #fff; }
.mybet-book { font-size: 0.6rem; color: var(--white3); margin-top: 2px; }

.mybet-cell { text-align: center; }
.mybet-lbl { font-size: 0.55rem; color: var(--white3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.mybet-val { font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; font-weight: 700; }

.result-select {
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--white);
  font-family: 'Barlow', sans-serif;
  font-size: 0.75rem;
  padding: 5px 8px;
  border-radius: var(--radius-sm);
  outline: none;
  cursor: pointer;
  width: 100%;
}

.btn-delete {
  background: var(--red-dim);
  border: 1px solid rgba(255,69,96,0.2);
  color: var(--red);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.18s;
  width: 100%;
}
.btn-delete:hover { background: rgba(255,69,96,0.2); }

/* ===== ANALYTICS ===== */
.analytics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 1.25rem;
}

.chart-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
}

.chart-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white3);
  margin-bottom: 1rem;
}

.forecast-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
}

.forecast-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
}

.forecast-row:last-child { border-bottom: none; }
.forecast-row .label { color: var(--white2); }
.forecast-row .value { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.95rem; }
.forecast-row .value.green { color: var(--green); }
.forecast-row .value.amber { color: var(--amber); }

/* ===== EMPTY / LOADING ===== */
.empty-box, .loading-box {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--white3);
  font-size: 0.85rem;
}

.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border2);
  border-top-color: var(--blue-lt);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 1rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .bet-main { grid-template-columns: 1fr 1fr; }
  .kelly-box { grid-column: span 2; }
  .analytics-grid { grid-template-columns: 1fr; }
  .mybet-card { grid-template-columns: 1fr 1fr 1fr; }
  main { padding: 1rem; }
  header { padding: 0 1rem; }
  nav { display: none; }
}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <!-- SVG Logo mark matching Vedox logo -->
    <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 8 L20 32 L36 8" stroke="url(#grad1)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M14 8 L20 20 L26 8" stroke="url(#grad2)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M26 8 L34 2" stroke="url(#grad3)" stroke-width="3" stroke-linecap="round"/>
      <defs>
        <linearGradient id="grad1" x1="4" y1="8" x2="36" y2="32" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#a0b4d0"/>
        </linearGradient>
        <linearGradient id="grad2" x1="14" y1="8" x2="26" y2="20" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#1a5ce8"/>
          <stop offset="100%" stop-color="#3d7fff"/>
        </linearGradient>
        <linearGradient id="grad3" x1="26" y1="8" x2="34" y2="2" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#3d7fff"/>
          <stop offset="100%" stop-color="#60a0ff"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="logo-text-wrap">
      <div class="logo-name">VEDO<span>X</span></div>
      <span class="logo-tagline">Logic Over Luck</span>
    </div>
  </a>

<script>
// ===== CONFIG =====
const SHEET_ID = "1t8vBG7HNKcR-YZLnQ_BBpI0R8_OtIptY_yomZhwipEo";
const SHEETS = {
  Aalto1: "0",
  Aalto2: "1671726093",
  Aalto3: "2",
  Aalto4: "3"
};
const REFRESH = 120; // 2 min

// ===== STATE =====
let allBets = [];
let myBets = JSON.parse(localStorage.getItem("vedox_bets") || "[]");
let countdown = REFRESH;
let timer;
let lang = localStorage.getItem("vedox_lang") || "fi";
let bankrollChart, plChart;

// ===== LANGUAGE =====
function setLang(l) {
  lang = l;
  localStorage.setItem("vedox_lang", l);
  document.getElementById("btn-fi").classList.toggle("active", l === "fi");
  document.getElementById("btn-en").classList.toggle("active", l === "en");
  document.querySelectorAll("[data-fi]").forEach(el => {
    const txt = el.getAttribute(`data-${l}`);
    if (txt && el.tagName !== "INPUT" && el.tagName !== "SELECT" && el.tagName !== "OPTION") {
      el.textContent = txt;
    }
  });
  document.querySelectorAll("option[data-fi]").forEach(el => {
    el.textContent = el.getAttribute(`data-${l}`) || el.textContent;
  });
  document.documentElement.lang = l;
  renderBets();
  renderMyBets();
}

// ===== PAGES =====
function showPage(p, btn) {
  document.querySelectorAll(".page").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(el => el.classList.remove("active"));
  document.getElementById("page-" + p).classList.add("active");
  if (btn) btn.classList.add("active");
  if (p === "analytics") { renderMyBets(); setTimeout(renderAnalytics, 50); }
  if (p === "mybets") renderMyBets();
}

// ===== CSV PARSE =====
function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = []; let cur = "", inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    if (cols.length >= 9 && cols[0] && !cols[0].includes("Ei plus-EV")) {
      rows.push({
        ottelu:    cols[0],
        alkaa:     cols[1],
        markkina:  cols[2],
        kohde:     cols[3],
        kerroin:   parseFloat(cols[4]) || 0,
        kirja:     cols[5],
        pinnacle:  parseFloat(cols[6]) || 0,
        pinnProb:  cols[7],
        ev:        parseFloat((cols[8] || "0").replace("+","").replace("%","")) || 0,
        liiga:     cols[9] || "",
        aalto:     cols[10] || "",
        paivitetty:cols[11] || "",
      });
    }
  }
  return rows;
}

// ===== FETCH ALL SHEETS =====
async function fetchAll() {
  const allRows = [];
  for (const [name, gid] of Object.entries(SHEETS)) {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&t=${Date.now()}`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const text = await res.text();
      const rows = parseCSV(text).map(r => ({ ...r, aalto: name }));
      allRows.push(...rows);
    } catch(e) {}
  }
  allBets = allRows.sort((a, b) => b.ev - a.ev);
  renderBets();
  document.getElementById("bets-loading").style.display = "none";
  const upd = allBets[0]?.paivitetty || new Date().toLocaleString("fi-FI");
  countdown = REFRESH;
}

// ===== FILTERS =====
function getFiltered() {
  const evMin   = parseFloat(document.getElementById("f-ev-min").value) || 0;
  const oddsMin = parseFloat(document.getElementById("f-odds-min").value) || 0;
  const oddsMax = parseFloat(document.getElementById("f-odds-max").value) || 99;
  const sport   = document.getElementById("f-sport").value;
  const wave    = document.getElementById("f-wave").value;

  return allBets.filter(b =>
    b.ev >= evMin &&
    b.kerroin >= oddsMin &&
    b.kerroin <= oddsMax &&
    (!sport || b.liiga.includes(sport)) &&
    (!wave || b.aalto === wave)
  );
}

function resetFilters() {
  document.getElementById("f-ev-min").value = "3";
  document.getElementById("f-odds-min").value = "1.4";
  document.getElementById("f-odds-max").value = "2.5";
  document.getElementById("f-sport").value = "";
  document.getElementById("f-wave").value = "";
  renderBets();
}

// ===== KELLY =====
function kelly(prob, odds, frac, br) {
  const b = odds - 1, q = 1 - prob;
  return Math.max(0, (b * prob - q) / b) * frac * br;
}

// ===== SPORT LABEL =====
function sportLabel(liiga) {
  if (liiga.includes("soccer")) return "⚽";
  if (liiga.includes("basketball")) return "🏀";
  if (liiga.includes("icehockey")) return "🏒";
  if (liiga.includes("tennis")) return "🎾";
  return "🏆";
}

function evClass(ev) {
  if (ev >= 7) return "top";
  if (ev >= 5) return "high";
  return "";
}

// ===== RENDER BETS =====
function renderBets() {
  const br   = parseFloat(document.getElementById("bankroll").value) || 1000;
  const kf   = parseFloat(document.getElementById("kelly-frac").value) || 0.25;
  const list = document.getElementById("bets-list");
  const empty = document.getElementById("bets-empty");
  const stats = document.getElementById("bets-stats");
  const filtered = getFiltered();

  const fi = lang === "fi";
  document.getElementById("filter-info").innerHTML =
    `<strong>${filtered.length}</strong> / ${allBets.length} ${fi ? "kohdetta" : "opportunities"}`;

  if (filtered.length === 0) {
    empty.style.display = "block";
    list.innerHTML = "";
    stats.style.display = "none";
    return;
  }

  empty.style.display = "none";
  stats.style.display = "grid";

  const avg = (filtered.reduce((a, b) => a + b.ev, 0) / filtered.length).toFixed(1);
  document.getElementById("s-count").textContent = filtered.length;
  document.getElementById("s-bestev").textContent = "+" + filtered[0].ev.toFixed(1) + "%";
  document.getElementById("s-avgev").textContent = "+" + avg + "%";
  document.getElementById("s-bankroll").textContent = br.toLocaleString("fi-FI") + "€";

  list.innerHTML = filtered.map((b, i) => {
    const pinnProb = parseFloat(b.pinnProb) / 100 || 0.5;
    const ks = kelly(pinnProb, b.kerroin, kf, br);
    const rec = ks > 0 ? Math.min(ks, br * 0.05) : br * 0.01;
    const kpct = ((ks / br) * 100).toFixed(1);
    const pot = (rec * b.kerroin).toFixed(0);
    const ec = evClass(b.ev);
    const did = `d-${i}`;
    const icon = sportLabel(b.liiga);
    const mktLabel = b.markkina.replace(/_/g, " ").toUpperCase();

    return `<div class="bet-card ${ec}">
      <div class="bet-main" onclick="toggleDetail('${did}')">
        <div>
          <div class="match-top">
            <span class="badge badge-sport">${icon} ${b.liiga.split("_")[1]?.toUpperCase() || "SPT"}</span>
            <span class="badge badge-wave">${b.aalto}</span>
            <span class="badge badge-mkt">${mktLabel}</span>
          </div>
          <div class="match-name">${b.ottelu} · ${b.alkaa}</div>
          <div class="bet-target">${b.kohde}</div>
          <div class="bet-meta">
            <span class="meta-tag">${b.kirja}</span>
            <span class="meta-tag">Pinnacle ${b.pinnProb}</span>
            <span class="meta-tag">${fi ? "Voitto" : "Win"}: ${pot}€</span>
          </div>
        </div>
        <div class="cell">
          <div class="cell-lbl">${fi ? "Kerroin" : "Odds"}</div>
          <div class="cell-val">${b.kerroin.toFixed(2)}</div>
          <div class="cell-sub">${b.kirja}</div>
        </div>
        <div class="cell">
          <div class="cell-lbl">EV</div>
          <div class="cell-val ev-num">+${b.ev.toFixed(1)}%</div>
          <div class="cell-sub">vs Pinnacle</div>
        </div>
        <div class="kelly-box">
          <div class="kelly-amt">${rec.toFixed(0)}€</div>
          <div class="kelly-pct">Kelly ${kpct}%</div>
          <div class="kelly-lbl">${fi ? "Suositeltu panos" : "Recommended stake"}</div>
        </div>
      </div>
      <div class="bet-detail" id="${did}">
        <div class="detail-grid">
          <div class="detail-cell">
            <div class="detail-cell-lbl">${fi ? "Paras kerroin" : "Best odds"}</div>
            <div class="detail-cell-val" style="color:var(--green)">${b.kerroin.toFixed(3)}</div>
          </div>
          <div class="detail-cell">
            <div class="detail-cell-lbl">Pinnacle</div>
            <div class="detail-cell-val" style="color:var(--white2)">${b.pinnacle.toFixed(3)}</div>
          </div>
          <div class="detail-cell">
            <div class="detail-cell-lbl">${fi ? "No-vig tod." : "No-vig prob."}</div>
            <div class="detail-cell-val" style="color:var(--blue-lt)">${b.pinnProb}</div>
          </div>
          <div class="detail-cell">
            <div class="detail-cell-lbl">EV %</div>
            <div class="detail-cell-val" style="color:var(--green)">+${b.ev.toFixed(2)}%</div>
          </div>
          <div class="detail-cell">
            <div class="detail-cell-lbl">${fi ? "Panos" : "Stake"}</div>
            <div class="detail-cell-val" style="color:var(--amber)">${rec.toFixed(0)}€</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle("open");
}

// ===== MY BETS =====
function saveBets() { localStorage.setItem("vedox_bets", JSON.stringify(myBets)); }

function toggleAddForm() {
  const f = document.getElementById("add-form");
  f.style.display = f.style.display === "block" ? "none" : "block";
}

function saveBet() {
  const match = document.getElementById("f-match").value.trim();
  const target = document.getElementById("f-target").value.trim();
  if (!match || !target) { alert(lang === "fi" ? "Täytä ainakin ottelu ja kohde." : "Fill in at least match and selection."); return; }
  myBets.unshift({
    id: Date.now(),
    date: new Date().toLocaleDateString("fi-FI"),
    match, target,
    book: document.getElementById("f-book").value,
    odds: parseFloat(document.getElementById("f-odds").value) || 0,
    stake: parseFloat(document.getElementById("f-stake").value) || 0,
    ev: parseFloat(document.getElementById("f-ev").value) || 0,
    pinn: parseFloat(document.getElementById("f-pinn").value) || 0,
    result: document.getElementById("f-result").value,
  });
  saveBets(); renderMyBets(); toggleAddForm();
  ["f-match","f-target","f-book","f-odds","f-stake","f-ev","f-pinn"].forEach(id => document.getElementById(id).value = "");
}

function updateResult(id, val) {
  const b = myBets.find(x => x.id === id);
  if (b) { b.result = val; saveBets(); renderMyBets(); }
}

function deleteBet(id) {
  myBets = myBets.filter(x => x.id !== id);
  saveBets(); renderMyBets();
}

function renderMyBets() {
  const fi = lang === "fi";
  const won = myBets.filter(b => b.result === "won").length;
  const lost = myBets.filter(b => b.result === "lost").length;
  const settled = myBets.filter(b => b.result !== "pending");
  const totalStake = settled.reduce((a, b) => a + b.stake, 0);
  const totalProfit = myBets.reduce((a, b) => {
    if (b.result === "won") return a + b.stake * (b.odds - 1);
    if (b.result === "lost") return a - b.stake;
    return a;
  }, 0);
  const roi = totalStake > 0 ? (totalProfit / totalStake * 100).toFixed(1) : "—";

  document.getElementById("mb-total").textContent = myBets.length;
  document.getElementById("mb-won").textContent = won;
  document.getElementById("mb-lost").textContent = lost;
  const roiEl = document.getElementById("mb-roi");
  roiEl.textContent = roi !== "—" ? roi + "%" : "—";
  roiEl.className = "stat-val " + (parseFloat(roi) > 0 ? "green" : parseFloat(roi) < 0 ? "red" : "");

  const list = document.getElementById("mybets-list");
  if (myBets.length === 0) {
    list.innerHTML = `<div class="empty-box" data-fi="Ei betsejä vielä." data-en="No bets yet.">${fi ? "Ei betsejä vielä." : "No bets yet."}</div>`;
    return;
  }

  list.innerHTML = myBets.map(b => {
    const pl = b.result === "won" ? b.stake * (b.odds - 1) : b.result === "lost" ? -b.stake : null;
    const plStr = pl !== null ? (pl > 0 ? `+${pl.toFixed(2)}€` : `${pl.toFixed(2)}€`) : "—";
    const plColor = pl > 0 ? "var(--green)" : pl < 0 ? "var(--red)" : "var(--white2)";
    return `<div class="mybet-card ${b.result}">
      <div>
        <div class="mybet-match">${b.date} · ${b.book || "—"}</div>
        <div class="mybet-target">${b.target}</div>
        <div class="mybet-book">${b.match}</div>
      </div>
      <div class="mybet-cell">
        <div class="mybet-lbl">${fi ? "Kerroin" : "Odds"}</div>
        <div class="mybet-val">${b.odds.toFixed(2)}</div>
      </div>
      <div class="mybet-cell">
        <div class="mybet-lbl">${fi ? "Panos" : "Stake"}</div>
        <div class="mybet-val">${b.stake}€</div>
      </div>
      <div class="mybet-cell">
        <div class="mybet-lbl">EV</div>
        <div class="mybet-val" style="color:var(--green)">+${b.ev}%</div>
      </div>
      <div class="mybet-cell">
        <div class="mybet-lbl">${fi ? "Tulos €" : "P&L €"}</div>
        <div class="mybet-val" style="color:${plColor}">${plStr}</div>
      </div>
      <select class="result-select" onchange="updateResult(${b.id}, this.value)">
        <option value="pending" ${b.result==="pending"?"selected":""}>${fi?"Odottaa":"Pending"}</option>
        <option value="won" ${b.result==="won"?"selected":""}>${fi?"Voitto":"Won"}</option>
        <option value="lost" ${b.result==="lost"?"selected":""}>${fi?"Tappio":"Lost"}</option>
      </select>
      <button class="btn-delete" onclick="deleteBet(${b.id})">${fi?"Poista":"Delete"}</button>
    </div>`;
  }).join("");
}

// ===== ANALYTICS =====
function renderAnalytics() {
  const fi = lang === "fi";
  const settled = myBets.filter(b => b.result !== "pending");
  const won = settled.filter(b => b.result === "won").length;
  const totalStake = settled.reduce((a, b) => a + b.stake, 0);
  const totalProfit = myBets.reduce((a, b) => {
    if (b.result === "won") return a + b.stake * (b.odds - 1);
    if (b.result === "lost") return a - b.stake;
    return a;
  }, 0);
  const roi = totalStake > 0 ? (totalProfit / totalStake * 100).toFixed(1) : "—";
  const hitRate = settled.length > 0 ? (won / settled.length * 100).toFixed(1) : "—";
  const avgEV = myBets.length > 0 ? (myBets.reduce((a, b) => a + b.ev, 0) / myBets.length).toFixed(1) : "—";

  const profEl = document.getElementById("an-profit");
  profEl.textContent = totalProfit >= 0 ? `+${totalProfit.toFixed(2)}€` : `${totalProfit.toFixed(2)}€`;
  profEl.className = "stat-val " + (totalProfit > 0 ? "green" : totalProfit < 0 ? "red" : "");

  const roiEl = document.getElementById("an-roi");
  roiEl.textContent = roi !== "—" ? roi + "%" : "—";
  roiEl.className = "stat-val " + (parseFloat(roi) > 0 ? "green" : "red");

  document.getElementById("an-hit").textContent = hitRate !== "—" ? hitRate + "%" : "—";
  document.getElementById("an-avgev").textContent = avgEV !== "—" ? "+" + avgEV + "%" : "—";

  const br = parseFloat(document.getElementById("bankroll").value) || 1000;
  let running = br;
  const brLabels = [fi ? "Alku" : "Start"];
  const brData = [br];
  [...myBets].reverse().forEach((b, i) => {
    if (b.result === "won") running += b.stake * (b.odds - 1);
    else if (b.result === "lost") running -= b.stake;
    brLabels.push(`B${i + 1}`);
    brData.push(parseFloat(running.toFixed(2)));
  });

  const chartOpts = {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: "#3d5070" }, grid: { color: "rgba(61,127,255,0.06)" } },
      y: { ticks: { color: "#3d5070" }, grid: { color: "rgba(61,127,255,0.06)" } }
    }
  };

  if (bankrollChart) bankrollChart.destroy();
  bankrollChart = new Chart(document.getElementById("chart-bankroll"), {
    type: "line",
    data: {
      labels: brLabels,
      datasets: [{
        data: brData,
        borderColor: "#3d7fff",
        backgroundColor: "rgba(61,127,255,0.06)",
        borderWidth: 2,
        pointRadius: 3,
        tension: 0.35,
        fill: true
      }]
    },
    options: chartOpts
  });

  const plData = [...myBets].reverse().map(b => {
    if (b.result === "won") return parseFloat((b.stake * (b.odds - 1)).toFixed(2));
    if (b.result === "lost") return -b.stake;
    return 0;
  });
  const plLabels = [...myBets].reverse().map((_, i) => `B${i + 1}`);

  if (plChart) plChart.destroy();
  plChart = new Chart(document.getElementById("chart-pl"), {
    type: "bar",
    data: {
      labels: plLabels,
      datasets: [{
        data: plData,
        backgroundColor: plData.map(v => v >= 0 ? "rgba(0,214,143,0.55)" : "rgba(255,69,96,0.55)"),
        borderRadius: 4
      }]
    },
    options: chartOpts
  });

  const avgStake = myBets.length > 0 ? myBets.reduce((a, b) => a + b.stake, 0) / myBets.length : 25;
  const avgEvPct = parseFloat(avgEV) || 4;
  const weeklyEV = avgStake * (avgEvPct / 100) * 20;

  const rows = [
    { label: fi ? "Avg panos" : "Avg stake", value: avgStake.toFixed(0) + "€", cls: "" },
    { label: fi ? "Avg EV %" : "Avg EV %", value: "+" + avgEvPct.toFixed(1) + "%", cls: "green" },
    { label: fi ? "Betsejä / viikko (arvio)" : "Bets / week (est.)", value: "20", cls: "" },
    { label: fi ? "Odotettu tuotto / viikko" : "Expected profit / week", value: "+" + weeklyEV.toFixed(2) + "€", cls: "green" },
    { label: fi ? "Odotettu tuotto / kk" : "Expected profit / month", value: "+" + (weeklyEV * 4).toFixed(2) + "€", cls: "green" },
    { label: fi ? "Nykyinen kassa" : "Current bankroll", value: br.toLocaleString("fi-FI") + "€", cls: "amber" },
    { label: fi ? "Ennuste 1kk" : "Forecast 1mo", value: (br + weeklyEV * 4).toFixed(2) + "€", cls: "green" },
    { label: fi ? "Ennuste 3kk" : "Forecast 3mo", value: (br + weeklyEV * 12).toFixed(2) + "€", cls: "green" },
  ];

  document.getElementById("forecast-rows").innerHTML = rows.map(r =>
    `<div class="forecast-row"><span class="label">${r.label}</span><span class="value ${r.cls}">${r.value}</span></div>`
  ).join("");
}

// ===== TIMER =====
function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    countdown--;
    const m = Math.floor(countdown / 60), s = countdown % 60;
    document.getElementById("countdown-pill").textContent =
      `${lang === "fi" ? "Päivitys" : "Refresh"}: ${m}:${s.toString().padStart(2, "0")}`;
    if (countdown <= 0) fetchAll();
  }, 1000);
}

// ===== INIT =====
setLang(lang);
fetchAll();
startTimer();
renderMyBets();
</script>
</body>
</html>
