<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Betting Analyzer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'SF Mono', 'Fira Code', monospace;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  header {
    max-width: 960px;
    margin: 0 auto 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid #1e1e1e;
    padding-bottom: 1rem;
  }

  h1 {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
  }

  #status {
    font-size: 0.7rem;
    color: #444;
    text-align: right;
  }

  #countdown {
    color: #2ecc71;
    font-size: 0.7rem;
    margin-top: 2px;
  }

  #container { max-width: 960px; margin: 0 auto; }

  .settings {
    display: flex;
    gap: 1.5rem;
    align-items: flex-end;
    margin-bottom: 1.5rem;
    padding: 1rem 1.25rem;
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 4px;
  }

  .setting-group { display: flex; flex-direction: column; gap: 4px; }

  .setting-group label {
    font-size: 0.65rem;
    color: #555;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .setting-group input, .setting-group select {
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 6px 10px;
    border-radius: 3px;
    width: 120px;
    outline: none;
  }

  .setting-group input:focus, .setting-group select:focus {
    border-color: #2ecc71;
  }

  #summary {
    display: flex;
    gap: 2rem;
    margin-bottom: 1rem;
    font-size: 0.7rem;
    color: #444;
    letter-spacing: 0.05em;
  }

  #summary strong { color: #2ecc71; font-weight: 400; }

  #loading {
    color: #444;
    font-size: 0.8rem;
    padding: 3rem 0;
    text-align: center;
    letter-spacing: 0.1em;
  }

  #empty {
    display: none;
    color: #444;
    font-size: 0.8rem;
    text-align: center;
    padding: 3rem 0;
  }

  #error {
    display: none;
    color: #e74c3c;
    font-size: 0.75rem;
    padding: 1rem;
    border: 1px solid #2a1a1a;
    border-radius: 4px;
    background: #110a0a;
    margin-bottom: 1rem;
  }

  .bet-card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-left: 3px solid #2ecc71;
    border-radius: 4px;
    padding: 1rem 1.25rem;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 1.5rem;
    align-items: center;
  }

  .bet-card:hover { border-left-color: #27ae60; }

  .bet-match {
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .bet-target {
    font-size: 0.95rem;
    color: #fff;
    margin-bottom: 5px;
  }

  .bet-meta {
    font-size: 0.65rem;
    color: #444;
    display: flex;
    gap: 1rem;
  }

  .ev-block { text-align: center; min-width: 70px; }

  .ev-value {
    font-size: 1.3rem;
    color: #2ecc71;
    line-height: 1;
  }

  .ev-label {
    font-size: 0.6rem;
    color: #444;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .kelly-block {
    text-align: right;
    min-width: 100px;
    border-left: 1px solid #1e1e1e;
    padding-left: 1.25rem;
  }

  .kelly-value {
    font-size: 1.1rem;
    color: #f39c12;
    line-height: 1;
  }

  .kelly-pct {
    font-size: 0.7rem;
    color: #555;
    margin-top: 2px;
  }

  .kelly-label {
    font-size: 0.6rem;
    color: #444;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .high-ev { border-left-color: #f39c12; }
  .high-ev .ev-value { color: #f39c12; }
  .top-ev { border-left-color: #e74c3c; }
  .top-ev .ev-value { color: #e74c3c; }
</style>
</head>
<body>

<header>
  <h1>EV Analyzer</h1>
  <div id="status">
    <span id="last-update">—</span>
    <span id="countdown"></span>
  </div>
</header>

<div id="container">

  <div class="settings">
    <div class="setting-group">
      <label>Bankroll (€)</label>
      <input type="number" id="bankroll" value="1000" min="10" step="100" />
    </div>
    <div class="setting-group">
      <label>Kelly-fraktio</label>
      <select id="kelly-frac">
        <option value="0.1">10% (erittäin varovainen)</option>
        <option value="0.25" selected>25% (varovainen)</option>
        <option value="0.5">50% (normaali)</option>
        <option value="1.0">100% (täysi Kelly)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Flat bet %</label>
      <input type="number" id="flat-pct" value="0.75" min="0.25" max="5" step="0.25" />
    </div>
  </div>

  <div id="summary"></div>
  <div id="loading">Haetaan dataa...</div>
  <div id="empty">Ei plus-EV kohteita juuri nyt.</div>
  <div id="error"></div>
  <div id="bets"></div>

</div>

<script>
const SHEET_ID = "1t8vBG7HNKcR-YZLnQ_BBpI0R8_OtIptY_yomZhwipEo";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
const REFRESH_SECONDS = 300;

let allBets = [];
let countdown = REFRESH_SECONDS;
let timer;

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",").map(c => c.replace(/^"|"$/g, "").trim());
    if (cols.length >= 7 && cols[0] && cols[0] !== "Ei plus-EV kohteita juuri nyt") {
      const pinnPct = parseFloat(cols[5]) / 100;
      const odds = parseFloat(cols[3]) || 0;
      const ev = parseFloat(cols[6]) || 0;
      rows.push({
        match: cols[0],
        starts: cols[1],
        target: cols[2],
        odds,
        book: cols[4],
        pinnPct,
        ev,
        updated: cols[7] || "",
      });
    }
  }
  return rows.sort((a, b) => b.ev - a.ev);
}

function kelly(prob, odds, frac, bankroll) {
  const b = odds - 1;
  const q = 1 - prob;
  const k = Math.max(0, (b * prob - q) / b);
  return k * frac * bankroll;
}

function evClass(ev) {
  if (ev >= 10) return "top-ev";
  if (ev >= 5) return "high-ev";
  return "";
}

function render() {
  const bankroll = parseFloat(document.getElementById("bankroll").value) || 1000;
  const kellyFrac = parseFloat(document.getElementById("kelly-frac").value) || 0.25;
  const flatPct = parseFloat(document.getElementById("flat-pct").value) || 0.75;
  const flatStake = (bankroll * flatPct) / 100;

  const container = document.getElementById("bets");
  const summary = document.getElementById("summary");
  const empty = document.getElementById("empty");
  const loading = document.getElementById("loading");

  loading.style.display = "none";

  if (allBets.length === 0) {
    empty.style.display = "block";
    container.innerHTML = "";
    summary.innerHTML = "";
    return;
  }

  empty.style.display = "none";
  const avgEV = (allBets.reduce((a, b) => a + b.ev, 0) / allBets.length).toFixed(1);

  summary.innerHTML = `
    <span>${allBets.length} kohdetta</span>
    <span>Paras EV: <strong>+${allBets[0].ev.toFixed(1)}%</strong></span>
    <span>Keskiarvo EV: <strong>+${avgEV}%</strong></span>
    <span>Bankroll: <strong>${bankroll.toLocaleString("fi-FI")}€</strong></span>
  `;

  container.innerHTML = allBets.map(b => {
    const kellyStake = kelly(b.pinnPct, b.odds, kellyFrac, bankroll);
    const recStake = kellyStake > 0 ? Math.min(kellyStake, flatStake * 2) : flatStake;
    const kellyPct = ((kellyStake / bankroll) * 100).toFixed(2);

    return `
      <div class="bet-card ${evClass(b.ev)}">
        <div>
          <div class="bet-match">${b.match} · ${b.starts}</div>
          <div class="bet-target">${b.target}</div>
          <div class="bet-meta">
            <span>Pinnacle: ${(b.pinnPct * 100).toFixed(1)}%</span>
            <span>Kerroin: ${b.odds.toFixed(2)}</span>
            <span>${b.book}</span>
          </div>
        </div>
        <div class="ev-block">
          <div class="ev-value">+${b.ev.toFixed(1)}%</div>
          <div class="ev-label">EV</div>
        </div>
        <div class="kelly-block">
          <div class="kelly-value">${recStake.toFixed(0)}€</div>
          <div class="kelly-pct">Kelly ${kellyPct}%</div>
          <div class="kelly-label">Suositeltu panos</div>
        </div>
      </div>
    `;
  }).join("");
}

async function fetchData() {
  const errorEl = document.getElementById("error");
  errorEl.style.display = "none";
  try {
    const res = await fetch(CSV_URL + "&t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    allBets = parseCSV(text);
    render();
    const updated = allBets[0]?.updated || new Date().toLocaleString("fi-FI");
    document.getElementById("last-update").textContent = "Päivitetty: " + updated;
    countdown = REFRESH_SECONDS;
  } catch(e) {
    errorEl.style.display = "block";
    errorEl.textContent = "Virhe: " + e.message;
    document.getElementById("loading").style.display = "none";
  }
}

function startCountdown() {
  clearInterval(timer);
  timer = setInterval(() => {
    countdown--;
    const m = Math.floor(countdown / 60);
    const s = countdown % 60;
    document.getElementById("countdown").textContent =
      `Seuraava päivitys: ${m}:${s.toString().padStart(2,"0")}`;
    if (countdown <= 0) fetchData();
  }, 1000);
}

document.getElementById("bankroll").addEventListener("input", render);
document.getElementById("kelly-frac").addEventListener("change", render);
document.getElementById("flat-pct").addEventListener("input", render);

fetchData();
startCountdown();
</script>
</body>
</html>
